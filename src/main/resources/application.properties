spring.application.name=demo

spring.datasource.url=jdbc:mysql://localhost:3306/board?useSSL=false&serverTimezone=Asia/Seoul
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:0000}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

jwt.secret=${JWT_SECRET:thisIsASecretKeyForJwtTokenGenerationMustBe256BitsLong!!}
jwt.expiration=86400000